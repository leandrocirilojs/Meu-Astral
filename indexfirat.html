<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Oráculo Astral</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c0917">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Oráculo Astral">
<meta name="application-name" content="Oráculo Astral">
<meta name="description" content="Os astros revelam o seu caminho. Consulta espiritual personalizada com IA.">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --indigo: #1a1233;
    --deep: #0c0917;
    --violet: #6b4fa0;
    --violet-light: #a07ad0;
    --violet-dim: #3d2a60;
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dim: #6b5320;
    --star: #e8e0ff;
    --star-dim: #8878bb;
    /* theme accent overrides */
    --ta: #a07ad0;
    --ta2: #c9a84c;
    --tb: rgba(107,79,160,0.3);
  }

  /* ── RELIGION THEMES ── */
  body.theme-candomble {
    --deep: #0d0800; --violet: #b45309; --violet-light: #f59e0b;
    --violet-dim: #78350f; --gold: #10b981; --gold-light: #6ee7b7;
    --gold-dim: #065f46; --star: #fef3c7; --star-dim: #d97706;
    --ta: #f59e0b; --ta2: #10b981; --tb: rgba(180,83,9,0.3);
  }
  body.theme-espirita {
    --deep: #030f1a; --violet: #0369a1; --violet-light: #38bdf8;
    --violet-dim: #0c4a6e; --gold: #7c3aed; --gold-light: #c4b5fd;
    --gold-dim: #4c1d95; --star: #e0f2fe; --star-dim: #7dd3fc;
    --ta: #38bdf8; --ta2: #a78bfa; --tb: rgba(3,105,161,0.3);
  }
  body.theme-numerologia {
    --deep: #0f0a00; --violet: #b45309; --violet-light: #fbbf24;
    --violet-dim: #78350f; --gold: #dc2626; --gold-light: #fca5a5;
    --gold-dim: #7f1d1d; --star: #fdf4dc; --star-dim: #fcd34d;
    --ta: #fbbf24; --ta2: #f87171; --tb: rgba(180,83,9,0.3);
  }
  body.theme-santo-daime {
    --deep: #001a00; --violet: #15803d; --violet-light: #4ade80;
    --violet-dim: #14532d; --gold: #854d0e; --gold-light: #fde68a;
    --gold-dim: #713f12; --star: #f0fdf4; --star-dim: #86efac;
    --ta: #4ade80; --ta2: #fde68a; --tb: rgba(21,128,61,0.3);
  }
  body.theme-hinduismo {
    --deep: #0f0005; --violet: #9d174d; --violet-light: #f472b6;
    --violet-dim: #831843; --gold: #d97706; --gold-light: #fde68a;
    --gold-dim: #92400e; --star: #fdf2f8; --star-dim: #f9a8d4;
    --ta: #f472b6; --ta2: #fbbf24; --tb: rgba(157,23,77,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--deep);
    font-family: 'Crimson Pro', serif;
    color: var(--star);
    transition: background 0.6s, color 0.4s;
  }

  .stars-bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 100% 60% at 50% -5%, var(--tb) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 85% 85%, rgba(201,168,76,0.07) 0%, transparent 60%);
    transition: background 0.6s;
  }
  .stars-bg::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 8% 12%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 22% 38%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 38% 6%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 52% 28%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 67% 10%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 81% 42%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 18%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 14% 68%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 33% 82%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 58% 72%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 88%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 4%  48%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 46% 52%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 19% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 63% 46%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 95% 60%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 44% 80%, rgba(255,255,255,0.3) 0%, transparent 100%);
    animation: twinkle 5s infinite alternate;
  }
  @keyframes twinkle { 0%{opacity:.5} 50%{opacity:1} 100%{opacity:.6} }

  .screen {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    overflow-y: auto; overflow-x: hidden;
    transition: transform 0.5s cubic-bezier(0.77,0,0.175,1), opacity 0.4s ease;
    will-change: transform, opacity;
  }
  .screen.hidden-right  { transform: translateX(100%); opacity: 0; pointer-events: none; }
  .screen.hidden-left   { transform: translateX(-100%); opacity: 0; pointer-events: none; }
  .screen.active        { transform: translateX(0); opacity: 1; }

  .screen-inner {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 2rem 1.5rem;
    max-width: 520px;
    margin: 0 auto;
    width: 100%;
    min-height: 100%;
  }
  #screen6 .screen-inner, #screen7 .screen-inner {
    justify-content: flex-start;
    padding-bottom: 5rem;
  }

  .progress-bar-wrap {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 3px; background: rgba(107,79,160,0.15);
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--violet), var(--gold));
    transition: width 0.5s ease;
    box-shadow: 0 0 10px rgba(201,168,76,0.4);
  }

  .top-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 99;
    padding: 0.8rem 1.2rem;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, rgba(12,9,23,0.9) 0%, transparent 100%);
  }
  .nav-back {
    width: 36px; height: 36px;
    border: 1px solid var(--violet-dim);
    border-radius: 50%;
    background: rgba(107,79,160,0.12);
    color: var(--star-dim);
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    opacity: 0; pointer-events: none;
  }
  .nav-back.visible { opacity: 1; pointer-events: all; }
  .nav-back:hover { border-color: var(--violet-light); color: var(--star); }

  .step-label {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 0.6rem; color: var(--star-dim); letter-spacing: 0.2em;
  }
  .step-dots-nav { display: flex; gap: 6px; align-items: center; }
  .sdot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--violet-dim); transition: all 0.3s;
  }
  .sdot.active { background: var(--gold); box-shadow: 0 0 8px rgba(201,168,76,0.5); width: 18px; border-radius: 3px; }
  .sdot.done   { background: var(--violet-light); }

  .screen-title {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(1.2rem, 5vw, 1.8rem);
    color: var(--gold-light);
    text-shadow: 0 0 30px rgba(201,168,76,0.4);
    line-height: 1.3; margin-bottom: 0.5rem;
  }
  .screen-sub {
    font-style: italic; color: var(--star-dim);
    font-size: 0.95rem; line-height: 1.6;
    margin-bottom: 2rem; letter-spacing: 0.05em;
  }
  .sigil-big {
    font-size: 3.5rem; display: block; text-align: center;
    margin-bottom: 1.2rem;
    animation: float 4s ease-in-out infinite;
    filter: drop-shadow(0 0 20px var(--tb));
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.2), transparent);
    margin: 1.5rem 0;
  }

  /* ── RELIGION SELECTOR (Screen 0) ── */
  .religion-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.7rem;
    margin-bottom: 1.5rem;
  }
  .rel-card {
    border: 1px solid var(--violet-dim);
    border-radius: 10px;
    padding: 1rem 0.6rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    background: rgba(107,79,160,0.05);
    display: flex; flex-direction: column; align-items: center; gap: 0.35rem;
  }
  .rel-card:hover { border-color: var(--violet-light); background: rgba(107,79,160,0.15); transform: translateY(-2px); }
  .rel-card.selected { border-color: var(--gold); background: rgba(201,168,76,0.08); box-shadow: 0 0 18px rgba(201,168,76,0.2); }
  .rel-icon { font-size: 2rem; }
  .rel-name { font-family: 'Cinzel Decorative', cursive; font-size: 0.58rem; letter-spacing: 0.08em; color: var(--star-dim); text-transform: uppercase; }
  .rel-card.selected .rel-name { color: var(--gold); }

  /* ── SIGN GRID ── */
  .sign-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 0.6rem; margin-bottom: 1.5rem;
  }
  .sign-card {
    border: 1px solid var(--violet-dim); border-radius: 8px;
    padding: 0.7rem 0.3rem; text-align: center; cursor: pointer;
    transition: all 0.2s; background: rgba(107,79,160,0.05);
  }
  .sign-card:hover, .sign-card:active { border-color: var(--violet-light); background: rgba(107,79,160,0.18); transform: translateY(-2px); }
  .sign-card.selected { border-color: var(--gold); background: rgba(201,168,76,0.1); box-shadow: 0 0 18px rgba(201,168,76,0.2); }
  .sign-symbol { font-size: 1.6rem; display: block; }
  .sign-name   { font-size: 0.58rem; letter-spacing: 0.08em; color: var(--star-dim); text-transform: uppercase; margin-top: 0.2rem; font-family: 'Cinzel Decorative', cursive; }
  .sign-card.selected .sign-name { color: var(--gold); }

  .field-group { margin-bottom: 1.1rem; }
  .field-label { font-size: 0.72rem; color: var(--star-dim); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 0.4rem; display: block; }
  .field-input, .field-select, .field-textarea {
    width: 100%; background: rgba(107,79,160,0.1);
    border: 1px solid var(--violet-dim); color: var(--star);
    font-family: 'Crimson Pro', serif; font-size: 1.05rem;
    padding: 0.65rem 0.9rem; border-radius: 6px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s; -webkit-appearance: none;
  }
  .field-input:focus, .field-select:focus, .field-textarea:focus {
    border-color: var(--violet-light); box-shadow: 0 0 15px rgba(107,79,160,0.2);
  }
  .field-select option { background: #1a1233; }
  .field-textarea { resize: none; line-height: 1.65; }

  .mood-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.55rem; }
  .mood-btn {
    border: 1px solid var(--violet-dim); border-radius: 8px;
    padding: 0.7rem 0.3rem; text-align: center; cursor: pointer;
    background: rgba(107,79,160,0.05); transition: all 0.2s;
  }
  .mood-btn:hover, .mood-btn:active { border-color: var(--violet-light); background: rgba(107,79,160,0.18); }
  .mood-btn.selected { border-color: var(--gold); background: rgba(201,168,76,0.1); }
  .mood-icon  { font-size: 1.5rem; display: block; }
  .mood-label { font-size: 0.65rem; color: var(--star-dim); margin-top: 0.25rem; }
  .mood-btn.selected .mood-label { color: var(--gold); }

  .energy-track { position: relative; }
  input[type=range] {
    -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px;
    background: linear-gradient(90deg, var(--violet), var(--violet-dim));
    outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
    background: var(--gold); box-shadow: 0 0 12px rgba(201,168,76,0.5); cursor: pointer;
  }
  .energy-labels { display: flex; justify-content: space-between; font-size: 0.68rem; color: var(--star-dim); margin-top: 0.5rem; }

  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, rgba(107,79,160,0.5), rgba(60,30,100,0.7));
    border: 1px solid var(--violet);
    color: var(--gold-light);
    font-family: 'Cinzel Decorative', cursive; font-size: 0.78rem;
    letter-spacing: 0.18em; padding: 1rem; border-radius: 8px;
    cursor: pointer; transition: all 0.3s;
    position: relative; overflow: hidden; margin-top: 0.5rem;
  }
  .btn-primary::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.08), transparent);
    transform: translateX(-100%); transition: transform 0.6s;
  }
  .btn-primary:hover::before { transform: translateX(100%); }
  .btn-primary:hover { border-color: var(--violet-light); box-shadow: 0 0 30px rgba(107,79,160,0.5); transform: translateY(-2px); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .btn-ghost {
    width: 100%; background: transparent;
    border: 1px solid var(--violet-dim); color: var(--star-dim);
    font-family: 'Cinzel Decorative', cursive; font-size: 0.65rem;
    letter-spacing: 0.15em; padding: 0.75rem; border-radius: 8px;
    cursor: pointer; transition: all 0.2s; margin-top: 0.7rem;
  }
  .btn-ghost:hover { border-color: var(--violet-light); color: var(--star); }

  .loading-center {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1.5rem; flex: 1; text-align: center;
  }
  .orbit-ring {
    width: 80px; height: 80px; border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: var(--violet-light);
    border-right-color: var(--gold-dim);
    animation: orbit 1.2s linear infinite; position: relative;
  }
  .orbit-ring::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: 2rem;
    animation: orbit 1.2s linear infinite reverse;
  }
  @keyframes orbit { to { transform: rotate(360deg); } }
  .loading-text { font-style: italic; color: var(--star-dim); font-size: 1rem; animation: pulse 2s ease-in-out infinite; letter-spacing: 0.08em; }
  .loading-sub  { font-size: 0.82rem; color: var(--violet-dim); letter-spacing: 0.15em; }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

  .oracle-header {
    display: flex; align-items: center; gap: 1rem;
    padding: 1.2rem; border: 1px solid var(--violet-dim);
    border-radius: 8px; background: rgba(107,79,160,0.08); margin-bottom: 1.5rem;
  }
  .oracle-sign-emoji { font-size: 2.8rem; filter: drop-shadow(0 0 12px var(--tb)); }
  .oracle-name { font-family: 'Cinzel Decorative', cursive; color: var(--gold-light); font-size: 1rem; }
  .oracle-meta-sub { font-size: 0.8rem; color: var(--star-dim); font-style: italic; margin-top: 0.2rem; }

  .section-title {
    font-family: 'Cinzel Decorative', cursive; font-size: 0.62rem;
    color: var(--violet-light); letter-spacing: 0.2em; margin-bottom: 0.8rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: rgba(107,79,160,0.2); }

  .oracle-text { font-size: 1.05rem; line-height: 1.85; color: var(--star); font-style: italic; margin-bottom: 1.4rem; }

  .action-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; margin-bottom: 1.4rem; }
  @media(max-width:400px) { .action-cards { grid-template-columns: 1fr; } }
  .action-card { border: 1px solid rgba(107,79,160,0.25); border-radius: 8px; padding: 0.9rem; background: rgba(107,79,160,0.07); }
  .action-card-icon  { font-size: 1.3rem; margin-bottom: 0.35rem; display: block; }
  .action-card-title { font-family: 'Cinzel Decorative', cursive; font-size: 0.55rem; color: var(--gold); letter-spacing: 0.12em; margin-bottom: 0.35rem; }
  .action-card-text  { font-size: 0.9rem; line-height: 1.6; color: var(--star-dim); }

  .mantra-box {
    border: 1px solid rgba(201,168,76,0.2); border-radius: 8px;
    padding: 1rem 1.2rem; text-align: center;
    background: rgba(201,168,76,0.05); font-size: 1.05rem;
    color: var(--gold-light); font-style: italic; line-height: 1.6; margin-bottom: 1.4rem;
  }
  .chips-row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
  .chip {
    background: rgba(107,79,160,0.12); border: 1px solid rgba(107,79,160,0.25);
    border-radius: 20px; padding: 0.3rem 0.8rem; font-size: 0.82rem;
    color: var(--star-dim); display: flex; align-items: center; gap: 0.35rem;
  }
  .reflec-box {
    border-left: 2px solid var(--gold-dim); padding: 0.7rem 1rem;
    margin-bottom: 1.4rem; font-size: 1.05rem; color: var(--gold-light);
    font-style: italic; line-height: 1.7;
  }

  .followup-area { border-top: 1px solid rgba(107,79,160,0.15); padding-top: 1.2rem; margin-top: 0.5rem; }
  .followup-row { display: flex; gap: 0.6rem; }
  .followup-row input {
    flex: 1; background: rgba(107,79,160,0.1); border: 1px solid var(--violet-dim);
    color: var(--star); font-family: 'Crimson Pro', serif; font-size: 1rem;
    padding: 0.6rem 0.85rem; border-radius: 6px; outline: none; transition: border-color 0.2s;
  }
  .followup-row input:focus { border-color: var(--violet-light); }
  .followup-row button {
    background: rgba(107,79,160,0.2); border: 1px solid var(--violet-dim);
    color: var(--violet-light); font-family: 'Cinzel Decorative', cursive; font-size: 0.6rem;
    padding: 0.6rem 0.9rem; border-radius: 6px; cursor: pointer;
    letter-spacing: 0.1em; transition: all 0.2s; white-space: nowrap;
  }
  .followup-row button:hover { border-color: var(--violet-light); }
  .followup-row button:disabled { opacity: 0.4; cursor: not-allowed; }

  .history-entry {
    border-left: 2px solid var(--violet-dim); padding: 0.6rem 0.9rem;
    margin-top: 0.9rem; font-size: 0.95rem; color: var(--star-dim); font-style: italic; line-height: 1.7;
  }
  .history-q { font-style: normal; font-size: 0.7rem; color: var(--violet-light); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.25rem; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--violet-dim); border-radius: 2px; }
  .screen-inner { padding-top: 4rem; }

  .share-section { border-top: 1px solid rgba(107,79,160,0.2); padding-top: 1.4rem; margin-top: 1rem; margin-bottom: 0.5rem; }
  .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
  .social-btn {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.7rem 0.85rem; border-radius: 8px; border: 1px solid transparent;
    font-family: 'Crimson Pro', serif; font-size: 0.9rem; cursor: pointer;
    transition: all 0.2s; font-weight: 600;
  }
  .social-btn svg { width: 17px; height: 17px; flex-shrink: 0; }
  .social-btn:hover { transform: translateY(-2px); filter: brightness(1.15); }
  .social-btn.whatsapp  { background: rgba(37,211,102,0.1);  border-color: rgba(37,211,102,0.3);   color: #25d366; }
  .social-btn.twitter   { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); color: #e8e0ff; }
  .social-btn.instagram { background: rgba(225,48,108,0.1);  border-color: rgba(225,48,108,0.25);  color: #e1306c; }
  .social-btn.facebook  { background: rgba(66,103,178,0.12); border-color: rgba(66,103,178,0.3);   color: #7b9fe0; }
  .social-btn.threads   { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.12); color: #ccc; }
  .social-btn.copy      { background: rgba(201,168,76,0.1);  border-color: rgba(201,168,76,0.25);  color: var(--gold); }
</style>
</head>
<body>
<div class="stars-bg"></div>

<!-- PWA Install Banner -->
